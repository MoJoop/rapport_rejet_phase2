<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="robots" content="noindex"/>
<title>EHCVM3 — Rapports de rejets</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://unpkg.com/docx-preview@0.3.3/dist/docx-preview.min.js"></script>
<style>
:root{
  --bg:#f5f6f8; --surface:#ffffff; --ink:#1f2937; --muted:#6b7280; --faint:#9ca3af;
  --line:#e8eaed; --accent:#4f46e5; --accent-2:#6366f1; --accent-soft:#eef2ff;
  --h:#e8553b; --m:#e0962a; --l:#3a9d7a; --radius:14px;
  --shadow:0 1px 2px rgba(16,24,40,.04),0 4px 16px rgba(16,24,40,.06);
}
*{box-sizing:border-box}
html,body{margin:0}
body{font-family:Inter,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--ink);
  -webkit-font-smoothing:antialiased;font-size:14px;line-height:1.5}
a{color:inherit}
/* Header */
header{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.85);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line)}
.hwrap{max-width:1160px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;gap:14px}
.logo{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,var(--accent),var(--accent-2));
  display:grid;place-items:center;color:#fff;font-weight:700;font-size:15px;letter-spacing:.5px;box-shadow:var(--shadow)}
.brand h1{margin:0;font-size:16px;font-weight:700;letter-spacing:-.2px}
.brand p{margin:0;font-size:12px;color:var(--muted)}
.spacer{flex:1}
.snap{display:flex;align-items:center;gap:8px}
.snap label{font-size:12px;color:var(--muted)}
select,input{font-family:inherit;font-size:14px;color:var(--ink);background:var(--surface);
  border:1px solid var(--line);border-radius:10px;padding:9px 12px;outline:none;transition:.15s}
select:focus,input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
/* Layout */
.wrap{max-width:1160px;margin:0 auto;padding:22px 24px 60px}
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:18px}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow)}
.kpi .n{font-size:24px;font-weight:700;letter-spacing:-.5px}
.kpi .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-top:2px}
.kpi.accent .n{color:var(--accent)}
.search{position:relative;margin:6px 0 16px}
.search input{width:100%;padding-left:40px}
.search svg{position:absolute;left:13px;top:11px;color:var(--faint)}
.crumb{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin:4px 0 14px;font-size:13px}
.crumb .c{padding:5px 11px;border-radius:999px;background:var(--surface);border:1px solid var(--line);cursor:pointer;transition:.15s;color:var(--muted)}
.crumb .c:hover{border-color:var(--accent);color:var(--accent)}
.crumb .c.home{background:var(--accent-soft);border-color:transparent;color:var(--accent);font-weight:600}
.crumb .sep{color:var(--faint)}
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:10px;flex-wrap:wrap}
.toolbar .hint{font-size:12px;color:var(--muted)}
/* Cards */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px;
  box-shadow:var(--shadow);transition:.16s;cursor:pointer;display:flex;flex-direction:column;gap:8px}
.card:hover{transform:translateY(-2px);border-color:#d6d9ff;box-shadow:0 6px 22px rgba(79,70,229,.12)}
.card .ic{width:34px;height:34px;border-radius:10px;background:var(--accent-soft);color:var(--accent);
  display:grid;place-items:center;font-size:16px}
.card .t{font-weight:600;font-size:15px}
.card .s{font-size:12.5px;color:var(--muted)}
.card.file{cursor:default}
.sev{display:flex;gap:6px;margin-top:2px}
.sev span{font-size:11px;font-weight:600;padding:2px 9px;border-radius:999px}
.sev .ph{background:#fdecea;color:var(--h)} .sev .pm{background:#fcf2e2;color:var(--m)} .sev .pl{background:#e9f6f1;color:var(--l)}
.acts{display:flex;gap:8px;margin-top:6px}
.btn{font-family:inherit;font-size:13px;font-weight:500;border-radius:10px;padding:8px 13px;cursor:pointer;
  border:1px solid var(--accent);background:var(--accent);color:#fff;text-decoration:none;transition:.15s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:var(--accent-2)}
.btn.ghost{background:var(--surface);color:var(--accent)}
.btn.ghost:hover{background:var(--accent-soft)}
.btn.sm{padding:6px 11px;font-size:12.5px}
.empty{color:var(--muted);text-align:center;padding:40px;font-size:14px}
/* Modal preview */
.modal{position:fixed;inset:0;z-index:50;background:rgba(17,24,39,.45);backdrop-filter:blur(3px);
  display:none;align-items:flex-start;justify-content:center;padding:30px 16px;overflow:auto}
.modal.show{display:flex}
.box{background:var(--surface);border-radius:16px;width:min(900px,100%);box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden;margin:auto}
.box .head{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--surface)}
.box .head .t{font-weight:600}.box .head .sub{font-size:12px;color:var(--muted)}
.docx-host{padding:22px;background:#eef0f3;max-height:72vh;overflow:auto}
.docx-host .docx-wrapper{background:transparent;padding:0}
.docx-host .docx{box-shadow:var(--shadow);margin:0 auto}
.loading{display:flex;flex-direction:column;align-items:center;gap:12px;padding:50px;color:var(--muted)}
.spin{width:30px;height:30px;border:3px solid var(--accent-soft);border-top-color:var(--accent);border-radius:50%;animation:sp 0.8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
footer{text-align:center;color:var(--faint);font-size:12px;padding:24px}
/* Gate de connexion QG (côté client — filtre dissuasif, pas une sécurité forte) */
.gate{position:fixed;inset:0;z-index:100;background:linear-gradient(135deg,var(--accent),var(--accent-2));
  display:none;align-items:center;justify-content:center;padding:20px}
.gate.show{display:flex}
.gate .card2{background:var(--surface);border-radius:16px;padding:30px 28px;width:min(380px,100%);box-shadow:0 20px 60px rgba(0,0,0,.3)}
.gate h2{margin:8px 0 4px;font-size:18px}
.gate p{margin:0 0 16px;color:var(--muted);font-size:13px}
.gate label{display:block;font-size:12px;color:var(--muted);margin:10px 0 4px}
.gate input{width:100%}
.gate button{width:100%;margin-top:18px;background:var(--accent);color:#fff;border:none;border-radius:10px;
  padding:11px;font-size:14px;font-weight:600;cursor:pointer}
.gate button:hover{background:var(--accent-2)}
.gate .err{color:var(--h);font-size:12.5px;margin-top:10px;display:none}
@media(max-width:720px){.kpis{grid-template-columns:repeat(2,1fr)}.hwrap{flex-wrap:wrap}}
</style>
</head>
<body>
<div class="gate" id="gate">
  <form class="card2" onsubmit="return doLogin(event)">
    <div class="logo">CQ</div>
    <h2>Rapport hebdomadaire</h2>
    <p>Document réservé au QG. Connectez-vous pour le télécharger. (Les rapports de rejets restent en accès libre.)</p>
    <label>Identifiant</label>
    <input id="gu" autocomplete="username" autofocus/>
    <label>Mot de passe</label>
    <input id="gp" type="password" autocomplete="current-password"/>
    <button type="submit">Se connecter &amp; télécharger</button>
    <button type="button" class="btn ghost sm" style="width:100%;margin-top:8px;color:var(--muted);border:none" onclick="$('gate').classList.remove('show')">Annuler</button>
    <div class="err" id="gerr">Identifiant ou mot de passe incorrect.</div>
  </form>
</div>
<header>
  <div class="hwrap">
    <div class="logo">CQ</div>
    <div class="brand"><h1>Rapports de rejets — EHCVM3</h1><p id="brandsub">ANSD · Contrôle qualité ménage</p></div>
    <div class="spacer"></div>
    <div class="snap"><label>Snapshot</label><select id="snap"></select>
      <a id="hebdo" class="btn sm" style="display:none" download>📄 Rapport hebdomadaire</a>
    </div>
  </div>
</header>
<div class="wrap">
  <div class="kpis" id="kpis"></div>
  <div class="search">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
    <input id="q" placeholder="Rechercher un ménage (interview_key ou chef de ménage)…"/>
  </div>
  <div class="crumb" id="crumb"></div>
  <div class="toolbar">
    <div class="hint" id="hint"></div>
    <button class="btn ghost sm" id="zipbtn" onclick="zipScope()">⬇ Télécharger ce dossier (.zip)</button>
  </div>
  <div class="grid" id="list"></div>
</div>
<footer id="foot"></footer>

<div class="modal" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="box">
    <div class="head">
      <div style="flex:1"><div class="t" id="mtitle"></div><div class="sub" id="msub"></div></div>
      <a class="btn sm" id="mdl" download>⬇ Télécharger</a>
      <button class="btn ghost sm" onclick="closeModal()">✕ Fermer</button>
    </div>
    <div class="docx-host" id="docx"></div>
  </div>
</div>

<script>
let MENAGES=[], PATH=[], DATE="", SNAPS=[];
// Mode équipe : ?team=EQxx → vue verrouillée sur une équipe (sans rapport hebdo).
// Sans paramètre = vue QG complète.
const TEAM=new URLSearchParams(location.search).get('team');
// Navigation : Équipe → DR → Ménage (pas de niveau enquêteur/responsable).
const KEYS=TEAM?['dr']:['team','dr'];
const LABELS=TEAM?['DR','Ménages']:['Équipes','DR','Ménages'];
const ICONS=TEAM?['📍']:['👥','📍'];
const $=id=>document.getElementById(id);
const esc=s=>(s||"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
const fmtPhone=t=>{t=(t||"").replace(/\D/g,"");return t.length===9?`${t.slice(0,2)} ${t.slice(2,5)} ${t.slice(5,7)} ${t.slice(7)}`:t;};

async function init(){
  if(TEAM){ $("brandsub").textContent="Équipe "+TEAM+" · espace dédié"; document.title="Rejets — "+TEAM; }
  const m=await (await fetch("manifest.json?_="+Date.now())).json();
  SNAPS=m.snapshots;
  $("foot").textContent="Plateforme générée le "+m.generated+" · "+m.snapshots.length+" snapshot(s) · données EHCVM3";
  const sel=$("snap");
  m.snapshots.forEach(s=>{const o=document.createElement("option");o.value=s.date;o.textContent=s.date;sel.appendChild(o);});
  sel.onchange=()=>loadSnap(sel.value);
  $("q").oninput=render;
  if(m.snapshots.length) loadSnap(m.snapshots[0].date);
  else $("list").innerHTML='<div class="empty">Aucun snapshot disponible.</div>';
}
async function loadSnap(date){
  DATE=date;PATH=[];$("q").value="";
  const sn=SNAPS.find(s=>s.date===date);
  const hb=$("hebdo");
  // Rapport hebdo : visible seulement en vue QG (jamais en mode équipe).
  if(!TEAM&&sn&&sn.hebdo){hb.href=sn.hebdo;hb.style.display="inline-flex";}else{hb.style.display="none";}
  const d=await (await fetch(`rapports/${date}/_index.json?_=`+Date.now())).json();
  MENAGES=TEAM?d.menages.filter(x=>x.team===TEAM):d.menages;
  let h=0,mm=0,l=0;MENAGES.forEach(x=>{h+=x.n_h;mm+=x.n_m;l+=x.n_l;});
  const grp=TEAM?new Set(MENAGES.map(x=>x.dr)).size:new Set(MENAGES.map(x=>x.team)).size;
  $("kpis").innerHTML=`
    <div class="kpi accent"><div class="n">${MENAGES.length}</div><div class="lbl">Ménages</div></div>
    <div class="kpi"><div class="n">${grp}</div><div class="lbl">${TEAM?'DR':'Équipes'}</div></div>
    <div class="kpi"><div class="n" style="color:var(--h)">${h}</div><div class="lbl">Sévérité haute</div></div>
    <div class="kpi"><div class="n" style="color:var(--m)">${mm}</div><div class="lbl">Moyenne</div></div>
    <div class="kpi"><div class="n" style="color:var(--l)">${l}</div><div class="lbl">Faible</div></div>`;
  render();
}
function scope(){
  return MENAGES.filter(x=>PATH.every((p,i)=>x[KEYS[i]]===p));
}
function render(){
  const q=$("q").value.trim().toLowerCase();
  let rows=scope();
  if(q) rows=rows.filter(x=>x.interview_key.toLowerCase().includes(q)||(x.cm||"").toLowerCase().includes(q));
  let cb=`<span class="c home" onclick="go(0)">🏠 ${TEAM?TEAM+' · ':''}${DATE}</span>`;
  PATH.forEach((p,i)=>cb+=`<span class="sep">›</span><span class="c" onclick="go(${i+1})">${esc(p)}</span>`);
  $("crumb").innerHTML=cb;
  $("hint").textContent=(q?"Résultats de recherche":(LABELS[PATH.length]||""))+` — ${rows.length} élément(s)`;
  const showFiles=q||PATH.length>=KEYS.length;
  $("zipbtn").style.display=rows.length?"inline-flex":"none";
  const L=$("list");L.innerHTML="";
  if(!rows.length){L.innerHTML='<div class="empty">Aucun élément.</div>';return;}
  if(showFiles){
    rows.forEach(x=>{
      const c=document.createElement("div");c.className="card file";
      c.innerHTML=`<div class="t">${esc(x.cm)||"(sans nom)"}</div>
        <div class="s" style="font-family:ui-monospace,monospace">${esc(x.interview_key)} · ☎ ${fmtPhone(x.tel)}</div>
        <div class="sev"><span class="ph">${x.n_h} H</span><span class="pm">${x.n_m} M</span><span class="pl">${x.n_l} L</span></div>
        <div class="acts">
          <button class="btn ghost sm" onclick='preview(${JSON.stringify(x.path)},${JSON.stringify(x.interview_key)},${JSON.stringify(x.cm||"")})'>👁 Aperçu</button>
          <a class="btn sm" href="rapports/${DATE}/${encodeURI(x.path)}" download>⬇ Télécharger</a>
        </div>`;
      L.appendChild(c);
    });
    return;
  }
  const key=KEYS[PATH.length];
  const ic=ICONS[PATH.length];
  const groups={};
  rows.forEach(x=>{const k=x[key];(groups[k]=groups[k]||{n:0,r:0});groups[k].n++;groups[k].r+=x.n_total;});
  Object.keys(groups).sort().forEach(k=>{
    const g=groups[k],c=document.createElement("div");c.className="card";
    c.onclick=()=>{PATH.push(k);$("q").value="";render();};
    c.innerHTML=`<div class="ic">${ic}</div><div class="t">${esc(k)}</div><div class="s">${g.n} ménages · ${g.r} rejets</div>`;
    L.appendChild(c);
  });
}
function go(n){PATH=PATH.slice(0,n);$("q").value="";render();}

async function preview(path,ik,cm){
  const url=`rapports/${DATE}/${encodeURI(path)}`;
  $("mtitle").textContent=cm||ik;
  $("msub").textContent=ik;
  $("mdl").href=url;
  const host=$("docx");host.innerHTML='<div class="loading"><div class="spin"></div><div>Chargement de l’aperçu…</div></div>';
  $("modal").classList.add("show");document.body.style.overflow="hidden";
  try{
    const blob=await (await fetch(url)).blob();
    host.innerHTML="";
    await docx.renderAsync(blob,host,null,{className:"docx",inWrapper:true,ignoreHeight:true});
  }catch(e){
    host.innerHTML=`<div class="loading">Aperçu indisponible.<br><a class="btn sm" href="${url}" download>⬇ Télécharger le fichier</a></div>`;
  }
}
function closeModal(){$("modal").classList.remove("show");document.body.style.overflow="";$("docx").innerHTML="";}
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModal();});

// Login UNIQUEMENT pour le rapport hebdomadaire : la plateforme (navigation +
// rapports de rejets ménage) reste en accès libre. Le bouton « Rapport hebdomadaire »
// déclenche le gate ; une fois validé (session), le téléchargement se lance.
const QG_USER="qg_ehcvm3", QG_PASS="Passer1234";
let PENDING_HEBDO=null;
function doLogin(e){
  e.preventDefault();
  if($("gu").value.trim()===QG_USER && $("gp").value===QG_PASS){
    sessionStorage.setItem("qg_ok","1");
    $("gate").classList.remove("show");
    $("gerr").style.display="none";
    if(PENDING_HEBDO){ window.open(PENDING_HEBDO,"_blank"); PENDING_HEBDO=null; }
  }else{ $("gerr").style.display="block"; }
  return false;
}

async function zipScope(){
  const q=$("q").value.trim().toLowerCase();
  let rows=scope();
  if(q) rows=rows.filter(x=>x.interview_key.toLowerCase().includes(q)||(x.cm||"").toLowerCase().includes(q));
  if(!rows.length){alert("Aucun fichier à télécharger.");return;}
  if(rows.length>250 && !confirm(rows.length+" fichiers — le zip peut être volumineux. Continuer ?"))return;
  const btn=$("zipbtn");const old=btn.textContent;btn.textContent="⏳ Préparation…";btn.disabled=true;
  const zip=new JSZip();
  for(const x of rows){try{const b=await (await fetch(`rapports/${DATE}/${encodeURI(x.path)}`)).blob();zip.file(x.path,b);}catch(e){}}
  const blob=await zip.generateAsync({type:"blob"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download=`rapports_${DATE}_${PATH.join("_")||"tous"}.zip`;a.click();
  btn.textContent=old;btn.disabled=false;
}
// Le bouton « Rapport hebdomadaire » : si déjà connecté → téléchargement direct ;
// sinon on intercepte le clic pour demander la connexion.
$("hebdo").addEventListener("click", function(e){
  if(sessionStorage.getItem("qg_ok")==="1") return;   // déjà authentifié → laisse le download
  e.preventDefault();
  PENDING_HEBDO=this.href;
  $("gerr").style.display="none"; $("gu").value=""; $("gp").value="";
  $("gate").classList.add("show"); $("gu").focus();
});
// La plateforme est en accès libre : on charge toujours.
init();
</script>
</body>
</html>
